<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen Video</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
    }

    video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover; /* THIS MAKES IT FULL SCREEN */
        z-index: -1;
    }

    /* Optional text on top */
    .content {
        position: relative;
        color: white;
        font-size: 30px;
        text-align: center;
        top: 40%;
    }
</style>
</head>

<body>

<video autoplay muted loop>
    <source src="Screen Recording 2025-11-06 191404.mp4" type="video/mp4">
</video>

<div class="content">
    Your Website Content Here
</div>

</body>
</html>
